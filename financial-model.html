const fP = n => n==null?"—":`${Math.round(n*100)}%`;
const fPd = (n,d=1) => n==null?"—":`${(n*100).toFixed(d)}%`;

/* ═══════════════════════════════════════════════════════════════
   MAIN COMPONENT
   ═══════════════════════════════════════════════════════════════ */

const DEFAULTS = {
  page:0, sJoin:10000, bJoin:25000, pJoin:50000, sAnn:3000, bAnn:7500, pAnn:15000,
  maxMem:300, yr1Rec:50, yrNRec:75, sPct:0.40, bPct:0.40, attrit:0.05, upSB:0.08, upBP:0.05,
  y1Starter:true, y1Base:false, y1Premium:false,
  numCabins:10, cabinCost:475000, memWD:500, memWE:700,
  discWD:800, discWE:1100, discPerMonth:4, bbWD:450, bbWE:650,
  yr1Occ:0.35, yr2Occ:0.35, yr5Occ:0.60,
  extraNightPrice:650, extraNightPct:0.25, extraNightsPerMem:2,
  eventTicket:150, eventsPerYear:12, plus1Price:80, plus1Pct:0.25,
  peptidePrice:500, nadPrice:800, ivPrice:350, interventionPct:0.20, interventionsPerMem:2,
  chefDinner:3000, chefDinnerPct:0.08,
  gmSal:200000, chefSal:110000, groundSal:80000, cmSal:120000, gpRate:200, nurseRate:150, annualRaise:0.04,
  softwareBudget:5000, insuranceBudget:60000, maintenanceBudget:80000, marketingBudget:80000, fbCostPerNight:65,
};

const STORAGE_KEY = "alum-scenario-v2";

function usePersistedState() {
  const [state, setStateRaw] = useState(DEFAULTS);
  const [loaded, setLoaded] = useState(false);
  const saveTimer = useRef(null);

  // Load from storage on mount
  useEffect(() => {
    (async () => {
      try {
        const result = (() => { const v = localStorage.getItem(STORAGE_KEY); return v ? { value: v } : null; })();
        if (result && result.value) {
          const saved = JSON.parse(result.value);
          setStateRaw(prev => ({ ...prev, ...saved }));
        }
      } catch (e) {
        // No saved data or storage unavailable — use defaults
      }
      setLoaded(true);
    })();
  }, []);

  // Auto-save to storage on every change (debounced 400ms)
  const stateRef = useRef(state);
  stateRef.current = state;
  useEffect(() => {
    if (!loaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stateRef.current));
      } catch (e) {
        // Storage write failed — silent
      }
    }, 400);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
  }, [state, loaded]);

  const set = (key, val) => setStateRaw(prev => ({ ...prev, [key]: val }));
  const resetAll = async () => {
    setStateRaw(DEFAULTS);
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  };

  return { s: state, set, resetAll, loaded };
}

function ALUMModel() {
  const { s, set, resetAll, loaded } = usePersistedState();

  // Convenience aliases
  const page = s.page, setPage = v => set("page", v);
  const sJoin = s.sJoin, setSJoin = v => set("sJoin", v);
  const bJoin = s.bJoin, setBJoin = v => set("bJoin", v);
  const pJoin = s.pJoin, setPJoin = v => set("pJoin", v);
  const sAnn = s.sAnn, setSAnn = v => set("sAnn", v);
  const bAnn = s.bAnn, setBAnn = v => set("bAnn", v);
  const pAnn = s.pAnn, setPAnn = v => set("pAnn", v);
  const maxMem = s.maxMem, setMaxMem = v => set("maxMem", v);
  const yr1Rec = s.yr1Rec, setYr1Rec = v => set("yr1Rec", v);
  const yrNRec = s.yrNRec, setYrNRec = v => set("yrNRec", v);
  const sPct = s.sPct, setSPct = v => set("sPct", v);
  const bPct = s.bPct, setBPct = v => set("bPct", v);
  const attrit = s.attrit, setAttrit = v => set("attrit", v);
  const upSB = s.upSB, setUpSB = v => set("upSB", v);
  const upBP = s.upBP, setUpBP = v => set("upBP", v);
  const y1Starter = s.y1Starter, setY1Starter = v => set("y1Starter", v);
  const y1Base = s.y1Base, setY1Base = v => set("y1Base", v);
  const y1Premium = s.y1Premium, setY1Premium = v => set("y1Premium", v);
  const numCabins = s.numCabins, setNumCabins = v => set("numCabins", v);
  const cabinCost = s.cabinCost, setCabinCost = v => set("cabinCost", v);
  const memWD = s.memWD, setMemWD = v => set("memWD", v);
  const memWE = s.memWE, setMemWE = v => set("memWE", v);
  const discWD = s.discWD, setDiscWD = v => set("discWD", v);
  const discWE = s.discWE, setDiscWE = v => set("discWE", v);
  const discPerMonth = s.discPerMonth, setDiscPerMonth = v => set("discPerMonth", v);
  const bbWD = s.bbWD, setBbWD = v => set("bbWD", v);
  const bbWE = s.bbWE, setBbWE = v => set("bbWE", v);
  const yr1Occ = s.yr1Occ, setYr1Occ = v => set("yr1Occ", v);
  const yr2Occ = s.yr2Occ, setYr2Occ = v => set("yr2Occ", v);
  const yr5Occ = s.yr5Occ, setYr5Occ = v => set("yr5Occ", v);
  const extraNightPrice = s.extraNightPrice, setExtraNightPrice = v => set("extraNightPrice", v);
  const extraNightPct = s.extraNightPct, setExtraNightPct = v => set("extraNightPct", v);
  const extraNightsPerMem = s.extraNightsPerMem, setExtraNightsPerMem = v => set("extraNightsPerMem", v);
  const eventTicket = s.eventTicket, setEventTicket = v => set("eventTicket", v);
  const eventsPerYear = s.eventsPerYear, setEventsPerYear = v => set("eventsPerYear", v);
  const plus1Price = s.plus1Price, setPlus1Price = v => set("plus1Price", v);
  const plus1Pct = s.plus1Pct, setPlus1Pct = v => set("plus1Pct", v);
  const peptidePrice = s.peptidePrice, setPeptidePrice = v => set("peptidePrice", v);
  const nadPrice = s.nadPrice, setNadPrice = v => set("nadPrice", v);
  const ivPrice = s.ivPrice, setIvPrice = v => set("ivPrice", v);
  const interventionPct = s.interventionPct, setInterventionPct = v => set("interventionPct", v);
  const interventionsPerMem = s.interventionsPerMem, setInterventionsPerMem = v => set("interventionsPerMem", v);
  const chefDinner = s.chefDinner, setChefDinner = v => set("chefDinner", v);
  const chefDinnerPct = s.chefDinnerPct, setChefDinnerPct = v => set("chefDinnerPct", v);
  const gmSal = s.gmSal, setGmSal = v => set("gmSal", v);
  const chefSal = s.chefSal, setChefSal = v => set("chefSal", v);
  const groundSal = s.groundSal, setGroundSal = v => set("groundSal", v);
  const cmSal = s.cmSal, setCmSal = v => set("cmSal", v);
  const gpRate = s.gpRate, setGpRate = v => set("gpRate", v);
  const nurseRate = s.nurseRate, setNurseRate = v => set("nurseRate", v);
  const annualRaise = s.annualRaise, setAnnualRaise = v => set("annualRaise", v);
  const softwareBudget = s.softwareBudget, setSoftwareBudget = v => set("softwareBudget", v);
  const insuranceBudget = s.insuranceBudget, setInsuranceBudget = v => set("insuranceBudget", v);
  const maintenanceBudget = s.maintenanceBudget, setMaintenanceBudget = v => set("maintenanceBudget", v);
  const marketingBudget = s.marketingBudget, setMarketingBudget = v => set("marketingBudget", v);
  const fbCostPerNight = s.fbCostPerNight, setFbCostPerNight = v => set("fbCostPerNight", v);

  /* ─── DERIVED ─── */
  const pPct = Math.max(0, +(1 - sPct - bPct).toFixed(2));
  const blendMem = memWD * 5/7 + memWE * 2/7;
  const blendDisc = discWD * 5/7 + discWE * 2/7;
  const blendBB = bbWD * 5/7 + bbWE * 2/7;
  const avgIntervention = Math.round((peptidePrice + nadPrice + ivPrice) / 3);

  /* ═══ YEAR 1 CALCULATION ═══ */
  const yr1 = useMemo(() => {
    const rooms = 3, opDays = 360;
    const totalAvail = rooms * opDays;
    const paidNightsTotal = Math.round(totalAvail * yr1Occ);

    // Membership recruitment (only enabled tiers)
    const enabledTiers = [y1Starter, y1Base, y1Premium];
    const enabledCount = enabledTiers.filter(Boolean).length;
    let sNew = 0, bNew = 0, pNew = 0;
    if (enabledCount > 0) {
      const totalTarget = yr1Rec;
      if (y1Starter && y1Base && y1Premium) {
        sNew = Math.round(totalTarget * sPct);
        bNew = Math.round(totalTarget * bPct);
        pNew = totalTarget - sNew - bNew;
      } else if (y1Starter && y1Base) {
        const ratio = sPct / (sPct + bPct);
        sNew = Math.round(totalTarget * ratio);
        bNew = totalTarget - sNew;
      } else if (y1Starter && y1Premium) {
        const ratio = sPct / (sPct + pPct);
        sNew = Math.round(totalTarget * ratio);
        pNew = totalTarget - sNew;
      } else if (y1Base && y1Premium) {
        const ratio = bPct / (bPct + pPct);
        bNew = Math.round(totalTarget * ratio);
        pNew = totalTarget - bNew;
      } else if (y1Starter) { sNew = totalTarget; }
      else if (y1Base) { bNew = totalTarget; }
      else if (y1Premium) { pNew = totalTarget; }
    }
    const totalNew = sNew + bNew + pNew;

    // Comp nights from membership
    const compNights = sNew * 1 + bNew * 2 + pNew * 4;

    // Discovery nights
    const discNights = discPerMonth * 12;

    // Split paid nights
    const memberPaidNights = Math.max(0, paidNightsTotal - discNights - compNights);

    // Revenue: Membership
    const joinRev = sNew * sJoin + bNew * bJoin + pNew * pJoin;
    const annRev = sNew * sAnn + bNew * bAnn + pNew * pAnn;

    // Revenue: Accommodation
    const bbMemRev = memberPaidNights * blendBB;
    const bbDiscRev = discNights * blendDisc;
    const accomRev = bbMemRev + bbDiscRev;

    // Revenue: Events
    const paidTickets = Math.round(totalNew * plus1Pct * eventsPerYear);
    const eventRev = paidTickets * plus1Price;

    // Revenue: Interventions
    const intMems = Math.round(totalNew * interventionPct);
    const intRev = intMems * interventionsPerMem * avgIntervention;

    // Revenue: Extra nights
    const extraNightMems = Math.round(totalNew * extraNightPct);
    const extraNightRev = extraNightMems * extraNightsPerMem * extraNightPrice;

    // Revenue: Chef dinners
    const dinnerCount = Math.round(totalNew * chefDinnerPct);
    const dinnerRev = dinnerCount * chefDinner;

    const extrasRev = intRev + extraNightRev + dinnerRev;
    const totalRev = joinRev + annRev + accomRev + eventRev + extrasRev;

    // Opex: Staff (No community manager in Year 1)
    const coreStaff = gmSal + chefSal + groundSal;
    // Locum costs — included membership visits + paid extras
    const includedConsults = bNew * 1 + pNew * 2; // Base: 1 annual, Premium: 2
    const extrasConsults = intMems; // Each intervention buyer needs ≥1 GP consult for Rx
    const consultCount = includedConsults + extrasConsults;
    const includedNurse = Math.round(bNew * 2 + pNew * 4); // Base: 6-monthly bloods, Premium: quarterly
    const extrasNurse = intMems * interventionsPerMem; // Each session = 1 nurse callout
    const nurseCalls = includedNurse + extrasNurse;
    const locumCost = consultCount * gpRate + nurseCalls * nurseRate;
    // F&B
    const fbCost = 80000 + (paidNightsTotal + compNights) * fbCostPerNight;
    // Overheads
    const overhead = insuranceBudget * 0.6 + maintenanceBudget * 0.5 + marketingBudget + softwareBudget + 30000;
    const totalOpex = coreStaff + locumCost + fbCost + overhead;
    const ebitda = totalRev - totalOpex;

    return {
      sNew, bNew, pNew, totalNew, compNights, discNights, memberPaidNights,
      paidNightsTotal, totalAvail,
      joinRev, annRev, bbMemRev, bbDiscRev, accomRev, eventRev, paidTickets,
      intRev, intMems, extraNightRev, extraNightMems, dinnerRev, dinnerCount, extrasRev, totalRev,
      coreStaff, locumCost, consultCount, nurseCalls, fbCost, overhead, totalOpex, ebitda,
      margin: totalRev > 0 ? ebitda / totalRev : 0,
    };
  }, [yr1Rec, sJoin, bJoin, pJoin, sAnn, bAnn, pAnn, sPct, bPct, pPct, yr1Occ, y1Starter, y1Base, y1Premium, blendBB, blendDisc, discPerMonth, plus1Pct, plus1Price, eventsPerYear, interventionPct, interventionsPerMem, avgIntervention, extraNightPct, extraNightsPerMem, extraNightPrice, chefDinnerPct, chefDinner, gmSal, chefSal, groundSal, gpRate, nurseRate, fbCostPerNight, insuranceBudget, maintenanceBudget, marketingBudget, softwareBudget]);

  /* ═══ 5-YEAR MODEL (FY2029–FY2033) ═══ */
  const fy = useMemo(() => {
    const years = [];
    let sM = yr1.sNew, bM = yr1.bNew, pM = yr1.pNew;
    let total = sM + bM + pM;
    const cabNights = numCabins * 360;

    for (let i = 0; i < 5; i++) {
      const yr = i + 2; // Year 2–6
      const fyLabel = `FY${2028 + i + 1}`;
      const occTarget = yr2Occ + (yr5Occ - yr2Occ) * (i / 4);
      const raiseMulti = Math.pow(1 + annualRaise, i);

      // ── Member dynamics ──
      const openS = sM, openB = bM, openP = pM, openTotal = total;
      // Upgrades
      const upgSB = Math.round(sM * upSB);
      const upgBP = Math.round(bM * upBP);
      // Attrition (applied to post-upgrade counts)
      const postUpgS = sM - upgSB;
      const postUpgB = bM + upgSB - upgBP;
      const postUpgP = pM + upgBP;
      const leavS = Math.round(postUpgS * attrit);
      const leavB = Math.round(postUpgB * attrit);
      const leavP = Math.round(postUpgP * attrit);
      const totalLeave = leavS + leavB + leavP;
      // Net before new joins
      const netS = postUpgS - leavS;
      const netB = postUpgB - leavB;
      const netP = postUpgP - leavP;
      const netTotal = netS + netB + netP;
      // Recruitment
      const capacity = Math.max(0, maxMem - netTotal);
      const target = Math.min(yrNRec, capacity);
      const newS = Math.round(target * sPct);
      const newB = Math.round(target * bPct);
      const newP = Math.max(0, target - newS - newB);
      // Closing
      sM = netS + newS;
      bM = netB + newB;
      pM = netP + newP;
      total = sM + bM + pM;

      // ── Revenue: Membership ──
      const joinRev = newS * sJoin + newB * bJoin + newP * pJoin;
      const annRev = sM * sAnn + bM * bAnn + pM * pAnn;

      // ── Revenue: Accommodation ──
      const compNights = sM * 1 + bM * 2 + pM * 4;
      const discNightsYr = discPerMonth * 12;
      const remainAfterComp = Math.max(0, cabNights - compNights);
      const paidTotal = Math.round(remainAfterComp * occTarget);
      const discActual = Math.min(discNightsYr, paidTotal);
      const memPaidNights = Math.max(0, paidTotal - discActual);
      const accomRev = memPaidNights * blendMem + discActual * blendDisc;

      // ── Revenue: Events ──
      const paidTickets = Math.round(total * plus1Pct * eventsPerYear);
      const eventRev = paidTickets * plus1Price + (i >= 1 ? 40000 : 20000);

      // ── Revenue: Interventions ──
      const intMems = Math.round(total * interventionPct);
      const intRev = intMems * interventionsPerMem * avgIntervention;

      // ── Revenue: Extra nights ──
      const extraNightMems = Math.round(total * extraNightPct);
      const extraNightRev = extraNightMems * extraNightsPerMem * extraNightPrice;

      // ── Revenue: Chef dinners ──
      const dinnerCount = Math.round(total * chefDinnerPct);
      const dinnerRev = dinnerCount * chefDinner;

      const extrasRev = intRev + extraNightRev + dinnerRev;
      const farmRev = 10000 + i * 12000;

              <Row cells={["Paid Member Nights", ...fy.map(y => fN(y.memPaidNights))]} />
              <Row cells={["Total Occupied", ...fy.map(y => fN(y.compNights + y.paidTotal))]} />
              <Row cells={["Occupancy (paid)", ...fy.map(y => fP(y.occTarget))]} />
            </Box>

            <Box>
              <Hdr>Activity Metrics</Hdr>
              <Row cells={["", ...fy.map(y => y.fyLabel)]} header />
              <Row cells={["+1 Tickets Sold", ...fy.map(y => fN(y.paidTickets))]} />
              <Row cells={["Intervention Buyers", ...fy.map(y => fN(y.intMems))]} />
              <Row cells={["Extra Night Buyers", ...fy.map(y => fN(y.extraNightMems))]} />
              <Row cells={["Chef Dinners", ...fy.map(y => fN(y.dinnerCount))]} />
              <Row cells={["GP Consultations", ...fy.map(y => fN(y.consultCount))]} />
              <Row cells={["Nurse Callouts", ...fy.map(y => fN(y.nurseCalls))]} />
            </Box>

            <Box>
              <Hdr>Capital Expenditure</Hdr>
              <Row cells={["Property acquisition", f$(capex.property)]} />
              <Row cells={[`${numCabins} passive home eco cabins`, f$(capex.cabins)]} />
              <Row cells={["Clubhouse renovation", f$(capex.clubhouse)]} />
              <Row cells={["Wellness infrastructure (in-room model)", f$(capex.wellness)]} />
              <Row cells={["Estate & Farm", f$(capex.farm)]} />
              <Row cells={["Pre-opening costs", f$(capex.preOpen)]} />
              <Row cells={["Contingency (10%)", f$(contingency)]} />
              <Row cells={["TOTAL CAPEX", f$(totalCapex)]} bold accent border />
            </Box>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ALUMModel />);
</script>
</body>
</html>
